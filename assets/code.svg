<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;display=swap');
      .window { fill: #050a15; stroke: #00f0ff; stroke-width: 1.5; opacity: 0.95; }
      .header { fill: #0a192f; }
      .code { font-family: 'Fira Code', monospace; font-size: 15px; font-weight: 500; }
      .keyword { fill: #ff7b72; }
      .variable { fill: #79c0ff; }
      .string { fill: #a5d6ff; }
      .property { fill: #d2a8ff; }
      .punctuation { fill: #c8d1d9; }
      .comment { fill: #8b949e; font-style: italic; }
      
      .cursor { fill: #00f0ff; animation: blink 1s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Window Frame -->
  <rect x="10" y="10" width="780" height="330" rx="8" class="window" filter="url(#neon)"/>
  <rect x="11" y="11" width="778" height="35" rx="8" class="header" />
  
  <!-- Mac Buttons -->
  <circle cx="30" cy="28" r="6" fill="#ff5f56" />
  <circle cx="50" cy="28" r="6" fill="#ffbd2e" />
  <circle cx="70" cy="28" r="6" fill="#27c93f" />
  <text x="400" y="28" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">skyyy0.ts</text>

  <!-- Code Content -->
  <g transform="translate(30, 80)" class="code">
    <text y="0"><tspan class="keyword">const</tspan> <tspan class="variable">sky</tspan> <tspan class="punctuation">=</tspan> <tspan class="punctuation">{</tspan></text>
    <text y="30" x="30"><tspan class="property">role</tspan><tspan class="punctuation">:</tspan> <tspan class="string">"Full Stack Developer"</tspan><tspan class="punctuation">,</tspan></text>
    <text y="60" x="30"><tspan class="property">location</tspan><tspan class="punctuation">:</tspan> <tspan class="string">"Indonesia"</tspan><tspan class="punctuation">,</tspan></text>
    <text y="90" x="30"><tspan class="property">languages</tspan><tspan class="punctuation">:</tspan> <tspan class="punctuation">[</tspan></text>
    <text y="120" x="60"><tspan class="string">"JavaScript"</tspan><tspan class="punctuation">, </tspan><tspan class="string">"TypeScript"</tspan><tspan class="punctuation">, </tspan><tspan class="string">"Python"</tspan><tspan class="punctuation">, </tspan><tspan class="string">"C"</tspan><tspan class="punctuation">, </tspan><tspan class="string">"C++"</tspan></text>
    <text y="150" x="30"><tspan class="punctuation">],</tspan></text>
    <text y="180" x="30"><tspan class="property">currentlyBuilding</tspan><tspan class="punctuation">:</tspan> <tspan class="punctuation">[</tspan></text>
    <text y="210" x="60"><tspan class="string">"Web Apps"</tspan><tspan class="punctuation">, </tspan><tspan class="string">"Developer APIs"</tspan><tspan class="punctuation">, </tspan><tspan class="string">"AI Tools"</tspan></text>
    <text y="240" x="30"><tspan class="punctuation">]</tspan></text>
    <text y="270"><tspan class="punctuation">}</tspan><rect class="cursor" x="15" y="258" width="8" height="15"/></text>
  </g>
</svg>

