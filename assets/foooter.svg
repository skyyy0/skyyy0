<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;display=swap');
      .bg { fill: transparent; }
      .line { stroke: #00f0ff; stroke-width: 1; opacity: 0.5; }
      .text { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700; fill: #00f0ff; letter-spacing: 4px; }
      .pulse { animation: pulse-anim 2s infinite; }
      
      @keyframes pulse-anim {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; filter: drop-shadow(0 0 8px #00f0ff); }
      }
    </style>
  </defs>
  
  <rect width="100%" height="100%" class="bg" />
  
  <line x1="50" y1="50" x2="350" y2="50" class="line" />
  <line x1="650" y1="50" x2="950" y2="50" class="line" />
  
  <text x="500" y="55" class="text pulse" text-anchor="middle">SKYYY0 // SYSTEM ACTIVE</text>
  
  <circle cx="50" cy="50" r="3" fill="#00f0ff" class="pulse" />
  <circle cx="950" cy="50" r="3" fill="#00f0ff" class="pulse" />
</svg>

